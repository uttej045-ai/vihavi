version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: vihavi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vihavi_db
      POSTGRES_USER: vihavi
      POSTGRES_PASSWORD: vihavi123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vihavi -d vihavi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: vihavi_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vihavi:vihavi123@db:5432/vihavi_db
      SECRET_KEY: vihavi-super-secret-jwt-key-change-in-production-2026
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DEBUG: "true"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      ADMIN_EMAIL: admin@vihavi.dev
      ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
